      - title: "A GEANT4-Based Simulation of Directional Neutron Detectors Using Liquid Scintillators and Boron Carbide Moderators"
        authors:
          - Sharada Sahoo et al.
        releaseDate: 2025
        url: https://arxiv.org/abs/2507.14438
      - title: "MINER Reactor-Based Search for Axion-Like Particles Using Sapphire (Al2O3) Detectors"
        authors:
          - Sharada Sahoo et al.
        releaseDate: 2025
        url: https://arxiv.org/abs/2504.20960
      - title: "Reactor-Based Search for Axion-Like Particles Using a CsI(Tl) Detector"
        authors:
