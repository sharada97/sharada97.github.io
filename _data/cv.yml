cv:
  name: Sharada Sahoo
  label: Experimental Physicist
  email: sharada@berkeley.edu
  location: Berkeley, CA
  image: ""
  summary: >
    PhD in Physics (GPA 4.0) with over four years' experience in production environments, collaborating
    with engineers, physicists, and vendors to develop particle detectors for large-scale physics
    experiments. Extensive background in semiconductor and superconductor material fabrication, photon
    sensor characterization, and machine learning and data analysis using Python.

  social_networks:
    - network: GitHub
      username: sharada97
    - network: LinkedIn
      username: sharada-sahoo-177227230

  sections:
    Education:
      - institution: Texas A&M University
        location: College Station, TX
        url: https://www.tamu.edu/
        area: Physics
        studyType: PhD
        start_date: 2021
        end_date: 2025
        score: "CGPA 4.0/4.0"
        highlights:
          - "Dissertation: Dark matter searches using a ton-scale CsI(Tl) detector and a gram-scale superconducting sapphire detector."
          - "Coursework: Quantum Mechanics I & II, Machine Learning, Statistics, Electromagnetism I & II, Condensed Matter Physics."

      - institution: National Institute of Science Education and Research (NISER)
        location: Bhubaneswar, India
        url: https://www.niser.ac.in/
        area: Physics
        studyType: BS-MS
        start_date: 2016
        end_date: 2021
        score: "CGPA 8.0/10"
        highlights:
          - "Dissertation: Rare event search analysis using Si-based detectors."
          - "Coursework: Quantum Mechanics I & II, Advanced Electronics, Quantum Information, Quantum Field Theory I & II, Condensed Matter Physics."

    Experience:
      - company: Texas A&M University — CsI(Tl) Dark Matter & BSM Group
        position: Graduate Research Assistant
        location: College Station, TX
        start_date: 2023
        end_date: 2025
        summary: BSM particle searches using radioisotopes with a CsI(Tl) detector.
        highlights:
          - "Designed and constructed a ~100 kg CsI(Tl) detector instrumented with PMTs; ton-scale proposal under review at LANL and ORNL."
          - "Evaluated SiPM feasibility and facilitated group procurement of ~$200,000 in SiPMs and accessories from OnSemi."
          - "Automated HV control and DAQ; collected 600+ hours of continuous data and developed real-time Python pipelines handling datasets up to ~100 TB."
          - "Set sensitivity projections for ALP, Dark Photon, Dark Scalar, and Milli-Charged particles."
          - "Characterized detectors with multiple radioisotopes (22Na, 57Co, 60Co, 133Ba, 46Sc, 137Cs, 90Sr, 55Fe, 241Am)."

      - company: Texas A&M University — Cryogenic Detector Group
        position: Graduate Research Assistant
        location: College Station, TX
        start_date: 2025
        end_date: Present
        summary: Cryogenic noise analysis and improvement efforts.
        highlights:
          - "Implemented EMI/RF shielding and grounding techniques, reducing noise by ~20% and enabling a first-ever low-mass WIMP detector."
          - "Characterized thermal, Johnson, SQUID, and warm-electronics noise; collaborated with the UC Berkeley team."
          - "Operated a Bluefors dilution refrigerator to 8 mK; integrated wiring and optimized hardware for TES stability."

      - company: Texas A&M University — AggieFab
        position: Graduate Research Assistant
        location: College Station, TX
        start_date: 2024
        end_date: 2024
        summary: Josephson junction fabrication and qubit simulation.
        highlights:
          - "Fabricated Josephson junctions using an AJA sputtering machine for 40 nm Al deposition; patterned a three-layer Al/AlOx/Al stack."
          - "Designed junction masks in K-Layout and used a Heidelberg MLA150 maskless aligner with S1800 photoresist."
          - "Performed AFM/SEM thickness measurements and refined wet-etching parameters; documented procedures for the team."
          - "Ran qubit simulations in Ansys HFSS and collaborated with SLAC to optimize antenna structures minimizing radiative noise."

      - company: Texas A&M University — Superconducting Sensor Group
        position: Graduate Assistant
        location: College Station, TX
        start_date: 2021
        end_date: 2023
        summary: WIMP dark matter search with superconducting cryogenic sensors.
        highlights:
          - "Developed automated Python analysis pipelines, eliminating 100% of manual workload."
          - "Performed SQUID tuning and TES biasing using LabVIEW; ran large-scale DAQ with CAEN digitizers (ROOT/PyROOT)."
          - "Achieved a baseline resolution of 40 eV; presented at EXCESS 2024."
          - "Contributed to end-to-end experiment construction including dilution refrigerator operation and detector shielding."

      - company: Texas A&M University — Low-Cost Strip PET Scanner
        position: Graduate Mentor
        location: College Station, TX
        start_date: 2023
        end_date: 2023
        summary: Led development of a low-cost strip PET scanner using plastic scintillators and PMTs (~20x cheaper cancer detection).
        highlights:
          - "Demonstrated a single-strip plastic scintillator PET prototype at the TAMU Physics Festival 2023."
          - "Mentored undergraduates in scintillator prep, DAQ setup, and Python analysis; achieved source localization within 1-inch error."

